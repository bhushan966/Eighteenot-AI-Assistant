name: Streamlit RAG CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set Python Version
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Dependencies
        run: uv sync
      
      - name: Install Ruff
        run: uv add --dev ruff
      
      - name: Run Ruff
        run: uv run ruff check .

      - name: Show Installed Packages
        run: uv pip list

      - name: Check Python Syntax
        run: |
          uv run python -m py_compile app.py
          uv run python -m py_compile chatbot.py
          uv run python -m py_compile data_fetcher.py
          uv run python -m py_compile vector_store.py

      - name: Verify Imports
        run: |
          uv run python -c "import streamlit"
          uv run python -c "import langchain"

      - name: Verify Project Imports
        run: |
          uv run python -c "import chatbot"
          uv run python -c "import data_fetcher"
          uv run python -c "import vector_store"